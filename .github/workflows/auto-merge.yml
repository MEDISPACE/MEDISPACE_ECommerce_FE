name: Auto Merge dev → main

on:
  workflow_run:
    workflows: ["Frontend Pipeline"]
    branches: [develop]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: auto-merge-develop-to-main
  cancel-in-progress: false

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.INFRA_PAT }}

      - name: Merge dev → main
        env:
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main develop
          git checkout -B main origin/main

          echo "Merging tested develop commit ${TESTED_SHA} into main..."
          git merge "${TESTED_SHA}" --no-ff -m "chore: auto-merge tested develop → main"

          git push origin main
          echo "Merged successfully"
