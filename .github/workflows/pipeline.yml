name: Frontend Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/medispace-fe

permissions:
  contents: read
  actions: write

jobs:
  # ── CI: Lint + Build Check ────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint || true   # warn only — pre-existing issues
      - run: npm run build
        env:
          VITE_API_URL: https://placeholder.test
          VITE_GOOGLE_CLIENT_ID: placeholder
          VITE_GOOGLE_REDIRECT_URI: https://placeholder.test

  # ── Build & Push Docker Image ─────────────────────────────────────────────
  build-push:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_GOOGLE_REDIRECT_URI=${{ secrets.VITE_GOOGLE_REDIRECT_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trigger deploy (deploy.yml in BE repo) ────────────────────────────
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: MEDISPACE/MEDISPACE_ECommerce_BE
          event-type: deploy
          client-payload: '{"service": "frontend", "image_tag": "${{ github.sha }}"}'
